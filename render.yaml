# Render blueprint — backend (Docker) + frontend (Static) + Postgres.
#
# MUST live at the repo ROOT — Render only reads render.yaml from the
# repository root. The app itself lives in quoteforge_v3/, so each service
# sets `rootDir` to point Render at the right subdirectory; all paths below
# are then relative to that rootDir.
#
# Deploy via render.com → New → Blueprint → point at this repo. Render
# provisions all three resources in one go, wiring DATABASE_URL into the
# backend from the Postgres connection string and VITE_API_BASE_URL into
# the frontend from the backend's host.
#
# All secret env vars are marked `sync: false` so Render prompts for them
# at blueprint apply time rather than reading the (gitignored) .env.
#
# Tier: FREE. The backend web service sleeps after ~15min idle (first
# request after sleep takes ~30s). The free Postgres instance is suspended
# 90 days after creation. Bump `plan:` to `starter` for always-on + a
# persistent database.

services:
  # ─── Backend (FastAPI) ───────────────────────────────────────────
  - type: web
    name: quoteforge-backend
    runtime: docker
    rootDir: quoteforge_v3/backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      # Postgres connection string. main.py's database module normalises
      # the plain postgres:// scheme Render returns into postgresql+asyncpg://.
      - key: DATABASE_URL
        fromDatabase:
          name: quoteforge-db
          property: connectionString

      # Public hostname Render assigns to the service. Used to build
      # the Salesforce OAuth callback URL and post-consent redirects.
      # Public external URL of this backend. NOTE: Render's fromService
      # `property: host` returns the INTERNAL hostname (bare service name),
      # not the public *.onrender.com host — so it's hardcoded here. Used to
      # build the Salesforce OAuth callback URL.
      - key: PUBLIC_BASE_URL
        value: https://quoteforge-backend.onrender.com

      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"

      - key: SALESFORCE_LOGIN_URL
        value: https://login.salesforce.com

      # CORS — the public origin of the frontend static site. Hardcoded
      # for the same reason as PUBLIC_BASE_URL: fromService host gives the
      # internal name, which would never match the browser's real origin.
      - key: CORS_ALLOW_ORIGINS
        value: https://quoteforge-frontend.onrender.com

      # Platform super-admin allowlist. Override in the dashboard if
      # other team members need cross-tenant access too.
      - key: SUPER_ADMIN_EMAILS
        value: fahad.saleem@demandzen.com

      # Public frontend URL — embedded in buyer-room share links and used
      # as the OAuth post-redirect target back into the SPA. Without these,
      # share links and the CRM connect flow would point at localhost.
      - key: FRONTEND_BASE_URL
        value: https://quoteforge-frontend.onrender.com
      - key: BUYER_ROOM_PUBLIC_BASE
        value: https://quoteforge-frontend.onrender.com

      # Secrets — set in the Render dashboard, never committed.
      - key: SECRET_KEY
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SALESFORCE_CLIENT_ID
        sync: false
      - key: SALESFORCE_CLIENT_SECRET
        sync: false
      - key: QF_DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: QF_DEFAULT_USER_PASSWORD
        sync: false

  # ─── Frontend (Vite static build) ────────────────────────────────
  # Static sites on Render are always free — no `plan` field.
  - type: web
    name: quoteforge-frontend
    runtime: static
    rootDir: quoteforge_v3
    autoDeploy: true
    # Vite inlines VITE_API_BASE_URL (from the build env) into the bundle.
    # Hardcoded to the backend's public URL — Render's fromService host
    # property returns the internal hostname, which the browser can't reach.
    buildCommand: |
      npm install
      echo "Building with VITE_API_BASE_URL=$VITE_API_BASE_URL"
      npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://quoteforge-backend.onrender.com/api

    # Single-page-app fallback: React Router owns the routing, so every
    # non-asset URL must serve index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    # Long-cache hashed asset bundles; short-cache index.html so users
    # see new deploys promptly.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache

databases:
  - name: quoteforge-db
    plan: free
    region: oregon
    postgresMajorVersion: "16"
